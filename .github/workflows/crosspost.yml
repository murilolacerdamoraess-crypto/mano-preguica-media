name: crosspost
on:
  schedule:
    # Roda de DIA (12h UTC = 9h BRT) e AGENDA o post p/ 21h BRT via scheduled_at.
    # Assim o horário do post é cravado (21h), mesmo o cron do GitHub atrasando horas.
    - cron: '0 12 * * 1,3,5'   # Seg/Qua/Sex 12h UTC = 9h BRT (só dispara; publica 21h)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'modo seco (1 = nao posta, so lista)'
        default: '1'
      only_video:
        description: 'override manual: postar SO este video id (ex.: tRjp62LVJ3M)'
        default: ''
      only_net:
        description: 'override manual: nesta rede (tiktok|instagram|facebook)'
        default: ''
      schedule_at:
        description: 'agendar p/ ISO8601 UTC (ex.: 2026-07-18T00:00:00Z). vazio = agora'
        default: ''
permissions:
  contents: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: instalar ferramentas
        run: |
          python -m pip install -U yt-dlp >/dev/null
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
      - name: rodar robo
        env:
          DRY_RUN: ${{ inputs.dry_run || '0' }}
          ONLY_VIDEO: ${{ inputs.only_video || '' }}
          ONLY_NET: ${{ inputs.only_net || '' }}
          SCHEDULE_AT: ${{ inputs.schedule_at || '' }}
          POSTPROXY_KEY: ${{ secrets.POSTPROXY_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TMP_DIR: /tmp/xp
          START_DATE: '2026-07-15'
          MAX_PER_RUN: '1'
          MONTH_CAP: '9'
          POST_HOUR: '21'   # horário PADRÃO BRT dos posts (o robô agenda p/ esta hora)
        run: python scripts/crosspost.py
      - name: salvar ledger atualizado
        run: |
          git config user.name "crosspost-bot"
          git config user.email "bot@users.noreply.github.com"
          git add ledger.json schedule.json
          git commit -m "ledger: atualizado pelo robo [skip ci]" || echo "sem mudanca"
          git push || echo "push skip"
